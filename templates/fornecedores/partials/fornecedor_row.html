{% load fornecedor_tags %}
<tr id="fornecedor-{{ fornecedor.pk }}" style="border-bottom: 1px solid #2a2a4a;">
  <td style="padding: 0.75rem; color: #e0e0e0;">{{ fornecedor.razao_social }}</td>
  <td style="padding: 0.75rem; color: #e0e0e0; font-family: monospace;">{{ fornecedor.cnpj|cnpj_format }}</td>
  <td style="padding: 0.75rem; color: #e0e0e0;">{{ fornecedor.categoria.nome }}</td>
  <td style="padding: 0.75rem;">
    {% if fornecedor.ativo %}
      <span style="color: #4caf50; font-weight: 500;">Ativo</span>
    {% else %}
      <span style="color: #888;">Inativo</span>
    {% endif %}
  </td>
  <td style="padding: 0.75rem;">
    <a href="{% url 'fornecedores:editar' fornecedor.pk %}"
       style="color: #e94560; text-decoration: none; margin-right: 0.75rem;">
      Editar
    </a>
    <button
      hx-post="{% url 'fornecedores:toggle-ativo' fornecedor.pk %}"
      hx-target="#fornecedor-{{ fornecedor.pk }}"
      hx-swap="outerHTML"
      hx-confirm="Confirmar alteração de status?"
      style="background: none; border: 1px solid #2a2a4a; color: #aaa; padding: 0.25rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem;"
    >
      {% if fornecedor.ativo %}Inativar{% else %}Reativar{% endif %}
    </button>
  </td>
</tr>
