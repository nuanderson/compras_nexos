{% load static %}<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComprasNexos — Recuperar Senha</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">ComprasNexos</div>
    <div class="auth-subtitle">Recuperar senha</div>

    {% for message in messages %}
    <div class="banner banner-info">
      <span>{{ message }}</span>
    </div>
    {% endfor %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_email">E-mail *</label>
        <input type="email" id="id_email" name="email" class="form-input" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Enviar link de redefinição</button>
    </form>

    <div style="text-align: center; margin-top: 16px;">
      <a href="{% url 'accounts:login' %}" style="font-size: 12px;">Voltar para o login</a>
    </div>
  </div>
</body>
</html>
