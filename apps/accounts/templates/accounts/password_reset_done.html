{% load static %}<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComprasNexos — Link Enviado</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">ComprasNexos</div>

    <div class="banner banner-success">
      <span>Se esse e-mail estiver cadastrado, você receberá um link de redefinição em instantes.</span>
    </div>

    <p style="font-size: 14px; color: var(--color-text-muted); text-align: center; margin-top: 16px;">
      Verifique sua caixa de entrada e a pasta de spam. O link expira em 3 dias.
    </p>

    <div style="text-align: center; margin-top: 16px;">
      <a href="{% url 'accounts:login' %}" style="font-size: 12px; color: var(--color-text-muted);">Voltar para o login</a>
    </div>
  </div>
</body>
</html>
