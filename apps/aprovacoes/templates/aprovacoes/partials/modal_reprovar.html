<div class="card" style="margin-bottom:16px;border-color:var(--color-destructive);">
  <p style="font-size:14px;margin-bottom:8px;">
    <strong>Reprovar requisicao:</strong> {{ requisicao.descricao }}
  </p>
  <form
    hx-post="{% url 'aprovacoes:reprovar-gestor' requisicao.pk %}"
    hx-target="#fila-row-{{ requisicao.pk }}"
    hx-swap="outerHTML"
    hx-on::after-request="if(event.detail.successful) document.getElementById('modal-container').innerHTML=''">
    {% csrf_token %}
    <div class="form-group" style="margin-bottom:12px;">
      <label class="form-label" for="id_motivo">Motivo da Reprovacao *</label>
      <textarea
        name="motivo"
        id="id_motivo"
        rows="3"
        required
        class="form-input"
        style="width:100%;resize:vertical;">{{ form.motivo.value|default:"" }}</textarea>
      {% for error in form.motivo.errors %}
        <p class="form-error" style="color:var(--color-destructive);font-size:13px;margin-top:4px;">{{ error }}</p>
      {% endfor %}
    </div>
    <div style="display:flex;gap:8px;">
      <button type="submit" class="btn btn-destructive">Confirmar Reprovacao</button>
      <button
        type="button"
        onclick="document.getElementById('modal-container').innerHTML=''"
        class="btn btn-secondary">Cancelar</button>
    </div>
  </form>
</div>
